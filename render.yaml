services:
  # 1. Node.js Backend Server (Express)
  - type: web
    name: hiremind-api
    env: node
    region: ohio
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # You must set this manually in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a secure random string automatically
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: hiremind-ai
          envVarKey: RENDER_EXTERNAL_URL
      - key: CLIENT_URL
        fromService:
          type: web
          name: hiremind-client
          envVarKey: RENDER_EXTERNAL_URL

  # 2. Python AI Microservice (FastAPI)
  - type: web
    name: hiremind-ai
    env: python
    region: ohio
    plan: free
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # You must set this manually in the Render Dashboard

  # 3. Frontend Web Client (React + Vite)
  - type: web # Render Static Sites sometimes have issues routing SPAs from yaml, so we'll use a Node web service or Static site setup. Here we use Static Site.
    name: hiremind-client
    env: static
    region: ohio
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hiremind-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
